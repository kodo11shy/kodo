# 托班管理系统 - Nginx 配置
# ========================
# 使用方法：
#   1. 将 YOUR_DOMAIN 替换为真实域名
#   2. 如果没有域名，先用 IP 测试（把下面 server_name 改为服务器 IP）
#   3. 配好 HTTPS 后用 certbot 自动改写
#
# sudo ln -s /opt/tuoban/backend/deploy/nginx-tuoban.conf /etc/nginx/sites-enabled/tuoban

server {
    listen 80;
    server_name YOUR_DOMAIN.com;

    client_max_body_size 50M;

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 上传文件静态服务
    location /uploads/ {
        alias /opt/tuoban/uploads/;
        add_header Cache-Control "public, max-age=86400";
    }

    # 健康检查（无域名时用 IP 验证）
    location = /health {
        access_log off;
        return 200 "OK\n";
    }
}
